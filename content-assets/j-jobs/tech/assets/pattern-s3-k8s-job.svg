<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">패턴 3. S3 파일 수신 시 후행 Job 실행</title>
  <desc id="desc">J-Jobs S3 Watcher가 S3 객체 키를 감지하고 그 결과를 다양한 후행 Job 템플릿으로 전달하는 구조</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfefb"/>
      <stop offset="100%" stop-color="#f4f7ff"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#101828" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowGreen" markerWidth="4" markerHeight="4" refX="3.2" refY="2" orient="auto">
      <path d="M0,0 L4,2 L0,4 Z" fill="#039855"/>
    </marker>
    <marker id="arrowViolet" markerWidth="4" markerHeight="4" refX="3.2" refY="2" orient="auto">
      <path d="M0,0 L4,2 L0,4 Z" fill="#7a5af8"/>
    </marker>
    <style>
      .title { font: 700 34px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #101828; }
      .subtitle { font: 500 17px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #475467; }
      .cardTitle { font: 700 24px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #101828; }
      .cardText { font: 500 18px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #344054; }
      .small { font: 600 15px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #475467; }
      .label { font: 700 17px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #1d2939; }
      .step { font: 700 16px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #ffffff; }
      .chip { font: 700 14px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #067647; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg2)"/>

  <text x="90" y="90" class="title">패턴 3. S3 파일 수신 시 후행 Job 실행</text>
  <text x="90" y="125" class="subtitle">S3 감지 결과를 후행 Job으로 전달해 다양한 J-Jobs 템플릿과 연결하는 구조</text>

  <g filter="url(#shadow2)">
    <rect x="110" y="250" width="260" height="220" rx="30" fill="#ecfdf3" stroke="#75e0a7"/>
    <text x="185" y="312" class="cardTitle">Amazon S3</text>
    <text x="162" y="358" class="cardText">Bucket / Prefix</text>
    <text x="162" y="396" class="cardText">객체 수신 감지 대상</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="470" y="210" width="330" height="180" rx="28" fill="#ffffff" stroke="#d0d5dd"/>
    <circle cx="525" cy="264" r="22" fill="#039855"/>
    <text x="518" y="270" class="step">1</text>
    <text x="560" y="270" class="cardTitle">선행 Job</text>
    <text x="560" y="306" class="label">S3 Watcher</text>
    <text x="520" y="348" class="cardText">객체 키 감지</text>
    <text x="520" y="380" class="cardText">outparam으로 결과 전달</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="470" y="445" width="330" height="180" rx="28" fill="#ffffff" stroke="#d0d5dd"/>
    <circle cx="525" cy="499" r="22" fill="#7a5af8"/>
    <text x="518" y="505" class="step">2</text>
    <text x="560" y="505" class="cardTitle">후행 Job</text>
    <text x="560" y="541" class="label">객체 키 기반 업무 실행</text>
    <text x="520" y="583" class="cardText">후행 템플릿에 파라미터 전달</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="900" y="170" width="600" height="520" rx="34" fill="#ffffff" stroke="#c7d7fe" stroke-width="2" stroke-dasharray="10 8"/>
    <text x="950" y="225" class="cardTitle">후행 Job 선택지</text>

    <rect x="970" y="285" width="200" height="110" rx="22" fill="#eef4ff" stroke="#c7d7fe"/>
    <text x="1008" y="332" class="label">Rest API</text>
    <text x="1008" y="365" class="small">HTTP 기반 업무 호출</text>

    <rect x="1220" y="285" width="200" height="110" rx="22" fill="#fff7ed" stroke="#fdba74"/>
    <text x="1256" y="332" class="label">k8s Job</text>
    <text x="1256" y="365" class="small">Job Pod 실행</text>

    <rect x="970" y="445" width="200" height="110" rx="22" fill="#ecfdf3" stroke="#abefc6"/>
    <text x="1010" y="492" class="label">Command</text>
    <text x="1010" y="525" class="small">Shell / CLI 템플릿</text>

    <rect x="1220" y="445" width="200" height="110" rx="22" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="1268" y="492" class="label">기타</text>
    <text x="1268" y="525" class="small">Java 등 다양한 템플릿</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="130" y="715" width="1370" height="95" rx="24" fill="#fff7ed" stroke="#fd853a"/>
    <text x="540" y="772" class="cardText">핵심은 선행 감지 결과를 후행 Job으로 명확하게 전달하고 J-Jobs의 선후행 제어를 유지하는 것</text>
  </g>

  <line x1="370" y1="360" x2="470" y2="300" stroke="#039855" stroke-width="6" marker-end="url(#arrowGreen)"/>
  <line x1="635" y1="390" x2="635" y2="445" stroke="#7a5af8" stroke-width="6" marker-end="url(#arrowViolet)"/>
  <line x1="800" y1="535" x2="970" y2="340" stroke="#7a5af8" stroke-width="6" marker-end="url(#arrowViolet)"/>
  <line x1="800" y1="535" x2="1220" y2="340" stroke="#7a5af8" stroke-width="6" marker-end="url(#arrowViolet)"/>
  <line x1="800" y1="535" x2="970" y2="500" stroke="#7a5af8" stroke-width="6" marker-end="url(#arrowViolet)"/>
  <line x1="800" y1="535" x2="1220" y2="500" stroke="#7a5af8" stroke-width="6" marker-end="url(#arrowViolet)"/>
</svg>
