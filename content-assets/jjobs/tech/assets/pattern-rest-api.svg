<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">패턴 2. REST API 호출 기반 업무 실행</title>
  <desc id="desc">J-Jobs가 내부 서비스 엔드포인트를 통해 Kubernetes Deployment의 Spring Boot Pod를 호출하고, 공용 로그 스토리지를 통해 운영 로그를 확인하는 구조</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4fbff"/>
      <stop offset="100%" stop-color="#eef7f2"/>
    </linearGradient>
    <linearGradient id="cluster" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef8ff"/>
    </linearGradient>
    <linearGradient id="efs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8eb"/>
      <stop offset="100%" stop-color="#fff1d6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="4" markerHeight="4" refX="3.2" refY="2" orient="auto">
      <path d="M0,0 L4,2 L0,4 Z" fill="#1570ef"/>
    </marker>
    <marker id="arrowOrange" markerWidth="4" markerHeight="4" refX="3.2" refY="2" orient="auto">
      <path d="M0,0 L4,2 L0,4 Z" fill="#f79009"/>
    </marker>
    <style>
      .title { font: 700 34px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #475467; }
      .cardTitle { font: 700 24px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #0f172a; }
      .cardText { font: 500 18px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #344054; }
      .small { font: 600 15px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #475467; }
      .chip { font: 700 14px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #175cd3; }
      .pod { font: 700 18px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #0c4a6e; }
      .label { font: 700 16px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #1d2939; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="90" y="90" class="title">패턴 2. REST API 호출 기반 업무 실행</text>
  <text x="90" y="125" class="subtitle">J-Jobs가 실행 제어를 담당하고 Kubernetes는 상시 기동형 업무 Pod의 확장과 처리량을 담당하는 구조</text>

  <g filter="url(#shadow)">
    <rect x="90" y="180" width="320" height="360" rx="28" fill="#ffffff" stroke="#d0d5dd"/>
    <rect x="90" y="180" width="320" height="78" rx="28" fill="#eaf4ff"/>
    <text x="130" y="228" class="cardTitle">J-Jobs</text>
    <text x="130" y="286" class="cardText">스케줄 실행</text>
    <text x="130" y="324" class="cardText">선후행 제어</text>
    <text x="130" y="362" class="cardText">재실행 / 승인 / 알림</text>
    <text x="130" y="400" class="cardText">실행 이력 / 로그 확인</text>
    <rect x="130" y="446" width="156" height="40" rx="20" fill="#d1e9ff"/>
    <text x="156" y="472" class="chip">운영 제어 중심</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="265" width="250" height="170" rx="26" fill="#ffffff" stroke="#d0d5dd"/>
    <rect x="530" y="298" width="190" height="48" rx="24" fill="#eff8ff"/>
    <text x="580" y="329" class="label">호출 엔드포인트</text>
    <text x="564" y="380" class="cardText">Internal Service</text>
    <text x="564" y="410" class="small">또는 Ingress / ALB</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="150" width="680" height="470" rx="34" fill="url(#cluster)" stroke="#b2ddff" stroke-width="2" stroke-dasharray="10 8"/>
    <text x="870" y="205" class="cardTitle">Kubernetes Cluster</text>

    <rect x="870" y="240" width="250" height="120" rx="24" fill="#ffffff" stroke="#d0d5dd"/>
    <text x="925" y="286" class="label">Deployment</text>
    <text x="936" y="322" class="cardText">Spring Boot 업무</text>
    <text x="936" y="350" class="small">HPA로 Pod 수 조절</text>

    <rect x="1180" y="240" width="260" height="120" rx="24" fill="#ecfdf3" stroke="#abefc6"/>
    <text x="1285" y="286" class="label">Auto Scaling</text>
    <text x="1263" y="322" class="cardText">부하에 따라 Pod 증감</text>
    <text x="1263" y="350" class="small">처리량과 응답성 분리</text>

    <rect x="885" y="415" width="170" height="140" rx="24" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="935" y="468" class="pod">Pod A</text>
    <text x="919" y="505" class="small">Spring Boot</text>
    <text x="919" y="533" class="small">업무 처리</text>

    <rect x="1075" y="415" width="170" height="140" rx="24" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="1125" y="468" class="pod">Pod B</text>
    <text x="1109" y="505" class="small">Spring Boot</text>
    <text x="1109" y="533" class="small">업무 처리</text>

    <rect x="1265" y="415" width="170" height="140" rx="24" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="1315" y="468" class="pod">Pod C</text>
    <text x="1299" y="505" class="small">Spring Boot</text>
    <text x="1299" y="533" class="small">업무 처리</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="280" y="660" width="1040" height="150" rx="28" fill="url(#efs)" stroke="#fdb022"/>
    <text x="720" y="715" class="cardTitle">공용 로그 스토리지</text>
    <text x="420" y="756" class="cardText">미리 지정된 J-Jobs 로그 경로에 업무 Pod 로그를 적재</text>
    <text x="420" y="792" class="small">완료 후 J-Jobs Manager에서 업무 로그 확인</text>
  </g>

  <line x1="410" y1="360" x2="500" y2="350" stroke="#1570ef" stroke-width="6" marker-end="url(#arrowBlue)"/>
  <text x="430" y="324" class="small">REST API 호출</text>

  <line x1="750" y1="350" x2="870" y2="300" stroke="#1570ef" stroke-width="6" marker-end="url(#arrowBlue)"/>
  <text x="775" y="320" class="small">서비스 진입</text>

  <line x1="1120" y1="300" x2="1180" y2="300" stroke="#1570ef" stroke-width="5" marker-end="url(#arrowBlue)"/>

  <line x1="995" y1="360" x2="970" y2="415" stroke="#1570ef" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <line x1="995" y1="360" x2="1160" y2="415" stroke="#1570ef" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <line x1="995" y1="360" x2="1350" y2="415" stroke="#1570ef" stroke-width="5" marker-end="url(#arrowBlue)"/>

  <line x1="250" y1="540" x2="360" y2="660" stroke="#f79009" stroke-width="5" marker-end="url(#arrowOrange)"/>
  <text x="118" y="594" class="small">로그 조회</text>

  <line x1="970" y1="555" x2="860" y2="660" stroke="#f79009" stroke-width="5" marker-end="url(#arrowOrange)"/>
  <line x1="1160" y1="555" x2="980" y2="660" stroke="#f79009" stroke-width="5" marker-end="url(#arrowOrange)"/>
  <line x1="1350" y1="555" x2="1100" y2="660" stroke="#f79009" stroke-width="5" marker-end="url(#arrowOrange)"/>
  <text x="1180" y="620" class="small">업무 로그 적재</text>
</svg>
